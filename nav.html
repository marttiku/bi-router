      assert(!hasCoord(59.2, 24.2), 'overlapping detour not present');

      /* ── Test 9: adjacent detours (touching, not overlapping) ── */
      console.log('Test 9: adjacent detours (B starts at A rejoin)');
      setup();
      addDetour(20, 30, [[59.1, 24.1]]);
      addDetour(30, 40, [[59.2, 24.2]]);
      assert(detours.length === 2, `detours.length=${detours.length} should be 2`);
      assert(hasCoord(59.1, 24.1), 'detour A present');
      assert(hasCoord(59.2, 24.2), 'detour B present');

      /* ── Test 10: user on orig route, future detour A ahead, capture B before A ── */
      console.log('Test 10: capture B before existing future detour A');
      setup();
      addDetour(50, 60, [[59.7, 24.7], [59.71, 24.71]]);
      assert(detours.length === 1, 'detour A at [50,60] added');
      assert(hasCoord(59.7, 24.7), 'detour A present before capture');
      const curPt10 = originalRoute[20];
      const origSnap10 = snapToRoute(curPt10, originalRoute);
      assert(origSnap10.index === 20, `user snap=${origSnap10.index} should be 20`);
      addDetour(20, 35, [[59.8, 24.8], [59.81, 24.81]]);
      assert(detours.length === 2, `detours.length=${detours.length} should be 2`);
      assert(hasCoord(59.7, 24.7), 'detour A still present after capture B');
      assert(hasCoord(59.8, 24.8), 'detour B present');

      /* ── Test 11: capture B whose rejoinIdx overlaps future detour A ── */
      console.log('Test 11: capture B with rejoin overlapping future detour A');
      setup();
      addDetour(50, 60, [[59.7, 24.7]]);
      assert(detours.length === 1, 'detour A at [50,60] added');
      addDetour(30, 55, [[59.8, 24.8]]);
      assert(detours.length === 1, 'overlapping B rejected (rejoin 55 inside A [50,60])');
      assert(hasCoord(59.7, 24.7), 'detour A still present');
      assert(!hasCoord(59.8, 24.8), 'overlapping B not added');

      /* ── Test 12: capture B right before detour A (adjacent, no overlap) ── */
      console.log('Test 12: capture B right before future detour A (adjacent)');
      setup();
      addDetour(50, 60, [[59.7, 24.7]]);
      addDetour(30, 50, [[59.8, 24.8]]);
      assert(detours.length === 2, `detours.length=${detours.length} should be 2`);
      assert(hasCoord(59.7, 24.7), 'detour A present');
      assert(hasCoord(59.8, 24.8), 'detour B present');

      /* ── Test 13: full handleOppTap simulation — user at 20, detour A at [50,60], capturing B ── */
      console.log('Test 13: full handleOppTap sim — user on orig route, A ahead');
      setup();
      const dA13 = [];
      for (let i = 0; i < 8; i++) dA13.push([59.5 + i * 0.002, 24.5 + i * 0.002]);
      addDetour(50, 60, dA13);
      assert(detours.length === 1, 'detour A added');

      const cur13 = originalRoute[20];
      let active13 = null;
      let bestDist13 = Infinity;
      for (const d of detours) {
        const s = snapToRoute(cur13, d.coords);
        if (s.distance < bestDist13) { bestDist13 = s.distance; active13 = d; }
      }
      const orig13 = snapToRoute(cur13, originalRoute);
      let dept13;
      if (active13 && bestDist13 <= orig13.distance) {
        dept13 = active13.rejoinIdx;
      } else {
        active13 = null;
        dept13 = orig13.index;
        for (const d of detours) {
          if (dept13 >= d.departIdx && dept13 < d.rejoinIdx) { active13 = d; dept13 = d.rejoinIdx; }
        }
      }
      assert(active13 === null, 'user is NOT inside any detour');
      assert(dept13 === 20, `departIdx=${dept13} should be 20`);

      const rejoin13 = Math.max(35, dept13 + 1);
      assert(rejoin13 === 35, `rejoinIdx=${rejoin13} should be 35`);

      const dB13 = [[59.9, 24.9], [59.91, 24.91]];
      addDetour(dept13, rejoin13, dB13);
      assert(detours.length === 2, `detours.length=${detours.length} should be 2`);
      assert(hasCoord(59.5, 24.5), 'detour A first coord still present');
      assert(hasCoord(59.9, 24.9), 'detour B present');
      assert(originalRoute.length === 100, 'originalRoute unchanged');

      /* ── Test 14: capture while inside A, with B ahead — overlap rejection preserves A ── */
      console.log('Test 14: capture while inside A, B ahead, overlap rejection');
      setup();
      const dA14 = [];
      for (let i = 0; i < 10; i++) dA14.push([59.5 + i * 0.001, 24.5 + i * 0.001]);
      addDetour(20, 30, dA14);
      addDetour(35, 45, [[59.7, 24.7]]);
      assert(detours.length === 2, 'A and existing B added');

      const cur14 = dA14[5];
      let active14 = null;
      let bestDist14 = Infinity;
      for (const d of detours) {
        const s = snapToRoute(cur14, d.coords);
        if (s.distance < bestDist14) { bestDist14 = s.distance; active14 = d; }
      }
      const orig14 = snapToRoute(cur14, originalRoute);
      let dept14;
      if (active14 && bestDist14 <= orig14.distance) {
        dept14 = active14.rejoinIdx;
      } else {
        active14 = null;
        dept14 = orig14.index;
        for (const d of detours) {
          if (dept14 >= d.departIdx && dept14 < d.rejoinIdx) { active14 = d; dept14 = d.rejoinIdx; }
        }
      }
      assert(active14 !== null, 'detected inside detour A');
      assert(dept14 === 30, `departIdx=${dept14} should be 30`);

      const rejoin14 = 40;
      addDetour(dept14, rejoin14, [[59.9, 24.9]]);
      assert(detours.length === 2, `detours.length=${detours.length} should still be 2 (overlap rejected)`);
      const a14 = detours.find(d => d.departIdx === 20);
      assert(a14 && a14.coords.length === 10, `detour A coords=${a14?.coords.length} should be 10 (intact)`);
      assert(hasCoord(59.7, 24.7), 'existing B still present');

      /* ── Test 15: chain two captures — both detours remain fully intact ── */
      console.log('Test 15: chain captures inside A, B chains after A');
      setup();
      const dA15 = [];
      for (let i = 0; i < 20; i++) dA15.push([59.5 + i * 0.001, 24.5 + i * 0.001]);
      addDetour(50, 60, dA15);
      assert(detours.length === 1, 'detour A at [50,60] added with 20 coords');

      const cur15 = dA15[3];
      let act15 = null;
      let bd15 = Infinity;
      for (const d of detours) {
        const s = snapToRoute(cur15, d.coords);
        if (s.distance < bd15) { bd15 = s.distance; act15 = d; }
      }
      const os15 = snapToRoute(cur15, originalRoute);
      let dp15;
      if (act15 && bd15 <= os15.distance) {
        dp15 = act15.rejoinIdx;
      } else {
        act15 = null; dp15 = os15.index;
      }
      assert(dp15 === 60, `departIdx=${dp15} should be 60 (chains after A)`);
      const dB15 = [[59.8, 24.8], [59.81, 24.81], [59.82, 24.82]];
      addDetour(dp15, 75, dB15);
      assert(detours.length === 2, 'both detours present');
      const aAfter = detours.find(d => d.departIdx === 50);
      assert(aAfter && aAfter.coords.length === 20, `A has ${aAfter?.coords.length} coords (all 20, not truncated)`);
      assert(hasCoord(59.5, 24.5), 'A first coord still present');
      assert(hasCoord(59.8, 24.8), 'B coords present');

      /* ── Restore ── */
      setup();

      console.log(`\nResults: ${pass} passed, ${fail} failed`);
      return fail === 0;
    };
  </script>
