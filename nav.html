<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Route Navigation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    #stats-bar {
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      z-index: 1000;
      flex-shrink: 0;
    }

    .stats-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 12px;
    }

    .stats-row + .stats-row {
      border-top: 1px solid #2a2a4a;
      padding: 6px 12px;
    }

    .stat-box {
      text-align: center;
      flex: 1;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8888aa;
    }

    .stat-val {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-top: 2px;
    }

    .stat-val.accent { color: #4fc3f7; }

    .stats-row.secondary .stat-val {
      font-size: 16px;
    }

    #map {
      flex: 1;
      width: 100%;
    }

    #controls {
      position: absolute;
      bottom: 24px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .map-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .map-btn:active { background: #2a2a4a; }
    .map-btn.active { background: #005499; color: #fff; }

    #compass-box {
      position: absolute;
      bottom: 24px;
      left: 16px;
      z-index: 1000;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #1a1a2e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #compass-arrow {
      font-size: 32px;
      transition: transform 0.3s ease-out;
      color: #4fc3f7;
    }

    #error-screen {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 24px;
      text-align: center;
    }

    #error-screen p {
      font-size: 16px;
      line-height: 1.6;
      color: #b0b0cc;
      max-width: 320px;
    }

    #error-screen .err-title {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
    }

    .gps-dot {
      width: 18px;
      height: 18px;
      background: #4285f4;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(66,133,244,0.6);
    }

    .gps-pulse {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(66,133,244,0.2);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }

    .start-flag, .end-flag {
      font-size: 20px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .sq-row { background: rgba(102, 51, 153, 0.1); }
    .stat-val.sq-accent { color: #bb86fc; }
    .stat-val.sq-accent-inho { color: #e8c070; }

    #opp-strip {
      position: absolute;
      bottom: 100px;
      left: 8px;
      right: 80px;
      z-index: 1000;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      pointer-events: auto;
    }
    #opp-strip::-webkit-scrollbar { display: none; }
    #opp-strip:empty { display: none; }

    .opp-card {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .opp-card.yellow { background: #ffd54f; }
    .opp-card.red { background: #ef9a9a; }
    .opp-card .opp-btn {
      background: rgba(0,0,0,0.15);
      border: none;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #000;
      cursor: pointer;
    }
    .opp-card .opp-btn:active { background: rgba(0,0,0,0.3); }

    @keyframes opp-pulse {
      0%   { transform: scale(1); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
      50%  { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.6); }
      100% { transform: scale(1); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    }
    .opp-card.new { animation: opp-pulse 0.6s ease-in-out 2; }

    .walk-marker {
      background: #ef5350;
      color: #fff;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .opp-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
    }
    .opp-dot.red { background: #ef5350; }
    .opp-dot.yellow { background: #ffd54f; }

    .leaflet-tile-pane { filter: brightness(0.85) saturate(0.8); }

    .leaflet-map-pane {
      will-change: transform;
    }

    #capture-toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      z-index: 2000;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }
    #capture-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    #capture-toast .sq-color { color: #bb86fc; }
    #capture-toast .inho-color { color: #e8c070; }

    .dev-banner {
      background: #ff5722;
      color: #fff;
      text-align: center;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ── Pit Stops / POI ─────────────────────────── */

    .poi-panel {
      position: absolute;
      bottom: 100px;
      left: 8px;
      right: 72px;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.95);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    .poi-results:empty { display: none; }

    .poi-loading {
      font-size: 12px;
      color: #bb86fc;
      padding: 4px 0;
    }

    .poi-empty {
      font-size: 12px;
      color: #666688;
      padding: 4px 0;
    }

    .poi-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .poi-item:active { background: rgba(255, 255, 255, 0.08); }

    .poi-rank {
      font-size: 18px;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }

    .poi-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .poi-name {
      font-size: 13px;
      color: #e0e0e0;
      font-weight: 500;
    }

    .poi-meta {
      font-size: 11px;
      color: #8888aa;
    }

    .poi-marker-icon {
      background: none !important;
      border: none !important;
    }

    .poi-marker {
      font-size: 20px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    #dev-uid-input {
      width: 110px;
      padding: 2px 6px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      background: rgba(0,0,0,0.2);
      color: #fff;
      font-size: 11px;
      outline: none;
    }
    #dev-uid-input::placeholder { color: rgba(255,255,255,0.5); }
    #dev-uid-btn {
      padding: 2px 8px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      background: rgba(0,0,0,0.2);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    #dev-uid-btn:active { background: rgba(0,0,0,0.4); }

    #dev-slider-wrap {
      position: absolute;
      bottom: 24px;
      left: 88px;
      right: 72px;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.92);
      border-radius: 20px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    #dev-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: #2a2a4a;
      border-radius: 2px;
      outline: none;
    }
    #dev-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4fc3f7;
      cursor: pointer;
      border: 2px solid #fff;
    }

    #dev-pos-label {
      font-size: 11px;
      color: #8888aa;
      min-width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    #dev-play-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: #4fc3f7;
      color: #000;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      line-height: 1;
    }
    #dev-play-btn:active { background: #039be5; }

    #dev-speed-btn {
      border: none;
      background: #2a2a4a;
      color: #4fc3f7;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 6px;
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
      min-width: 32px;
      text-align: center;
    }
    #dev-speed-btn:active { background: #3a3a5a; }
  </style>
</head>
<body>

  <div class="dev-banner" id="dev-banner" style="display:none">
    <span>DEV MODE</span>
    <input type="text" id="dev-uid-input" placeholder="Squadrats UID">
    <button id="dev-uid-btn">Load SQ</button>
  </div>

  <div id="stats-bar">
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Remaining</div>
        <div class="stat-val accent" id="dist-remaining">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">ETA</div>
        <div class="stat-val" id="eta">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Progress</div>
        <div class="stat-val" id="progress">—</div>
      </div>
    </div>
    <div class="stats-row secondary">
      <div class="stat-box">
        <div class="stat-label">Covered</div>
        <div class="stat-val" id="dist-covered">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Time</div>
        <div class="stat-val" id="elapsed">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Avg</div>
        <div class="stat-val" id="avg-speed">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Speed</div>
        <div class="stat-val" id="cur-speed">—</div>
      </div>
    </div>
    <div class="stats-row secondary sq-row" id="sq-stats" style="display:none">
      <div class="stat-box">
        <div class="stat-label">SQ Captured</div>
        <div class="stat-val sq-accent" id="sq-captured">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">SQ on Route</div>
        <div class="stat-val" id="sq-on-route">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Inhos</div>
        <div class="stat-val sq-accent-inho" id="inho-captured">0</div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <div id="opp-strip"></div>

  <div id="dev-slider-wrap" style="display:none">
    <button id="dev-play-btn" title="Play">▶</button>
    <button id="dev-speed-btn" title="Cycle speed">2x</button>
    <input type="range" id="dev-slider" min="0" max="0" value="0">
    <span id="dev-pos-label">0%</span>
  </div>

  <div id="poi-panel" class="poi-panel" style="display:none">
    <div id="poi-results" class="poi-results"></div>
  </div>

  <div id="controls">
    <button class="map-btn" id="btn-sq-opp" title="Squadrats opportunities" style="display:none">🔲</button>
    <button class="map-btn" id="btn-poi" title="Pit stops">☕</button>
    <button class="map-btn active" id="btn-center" title="Re-center">⊕</button>
    <button class="map-btn" id="btn-orient" title="North up / Heading up">N</button>
    <button class="map-btn" id="btn-lock" title="Keep screen on">☀</button>
  </div>

  <div id="compass-box">
    <div id="compass-arrow">↑</div>
  </div>

  <div id="capture-toast"></div>

  <div id="error-screen" style="display:none">
    <div>
      <p class="err-title" id="err-title">Error</p>
      <p id="err-msg"></p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    /* ── Polyline Decoding ─────────────────────── */
    function decodePolyline(encoded) {
      const points = [];
      let i = 0, lat = 0, lng = 0;
      while (i < encoded.length) {
        let b, shift = 0, result = 0;
        do { b = encoded.charCodeAt(i++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lat += (result & 1) ? ~(result >> 1) : (result >> 1);
        shift = 0; result = 0;
        do { b = encoded.charCodeAt(i++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lng += (result & 1) ? ~(result >> 1) : (result >> 1);
        points.push([lat / 1e5, lng / 1e5]);
      }
      return points;
    }

    /* ── Geo Helpers ───────────────────────────── */
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const toDeg = r => r * 180 / Math.PI;

    function haversine(a, b) {
      const dLat = toRad(b[0] - a[0]), dLng = toRad(b[1] - a[1]);
      const x = Math.sin(dLat/2)**2 + Math.cos(toRad(a[0])) * Math.cos(toRad(b[0])) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
    }

    function bearing(a, b) {
      const dLng = toRad(b[1] - a[1]);
      const y = Math.sin(dLng) * Math.cos(toRad(b[0]));
      const x = Math.cos(toRad(a[0])) * Math.sin(toRad(b[0])) -
                Math.sin(toRad(a[0])) * Math.cos(toRad(b[0])) * Math.cos(dLng);
      return (toDeg(Math.atan2(y, x)) + 360) % 360;
    }

    function routeLength(pts) {
      let d = 0;
      for (let i = 1; i < pts.length; i++) d += haversine(pts[i-1], pts[i]);
      return d;
    }

    function snapToRoute(pos, pts) {
      let minDist = Infinity, bestIdx = 0;
      for (let i = 0; i < pts.length; i++) {
        const d = haversine(pos, pts[i]);
        if (d < minDist) { minDist = d; bestIdx = i; }
      }
      return { index: bestIdx, distance: minDist };
    }

    /* ── Error Handling ────────────────────────── */
    function showError(title, msg) {
      document.getElementById('err-title').textContent = title;
      document.getElementById('err-msg').textContent = msg;
      document.getElementById('error-screen').style.display = 'flex';
    }

    /* ── Parse Route & Params ──────────────────── */
    const hashStr = window.location.hash.slice(1);
    if (!hashStr) {
      showError('No Route', 'Scan a QR code from the Route Planner to start navigation.');
    }

    const [encodedPoly, ...paramParts] = hashStr.split('&');
    const hashParams = {};
    for (const p of paramParts) {
      const [k, v] = p.split('=');
      if (k) hashParams[k] = decodeURIComponent(v || '');
    }

    const devMode = hashParams.dev === '1';

    let route;
    try {
      route = decodePolyline(decodeURIComponent(encodedPoly));
      if (route.length < 2) throw new Error('Too few points');
    } catch (e) {
      showError('Invalid Route', 'Could not decode the route data. Please scan the QR code again.');
    }

    if (!route) { throw new Error('abort'); }

    const originalRoute = route.map(p => [...p]);
    let detours = [];

    function buildEffectiveRoute() {
      const eff = [];
      let oi = 0;
      for (const d of detours) {
        while (oi < d.departIdx && oi < originalRoute.length) eff.push(originalRoute[oi++]);
        eff.push(...d.coords);
        oi = d.rejoinIdx;
      }
      while (oi < originalRoute.length) eff.push(originalRoute[oi++]);
      route = eff;
      routeLine.setLatLngs(route);
      totalDistVar = routeLength(route);
      const slider = document.getElementById('dev-slider');
      if (slider) slider.max = route.length - 1;
    }

    function isInDetourRange(origIdx) {
      for (const d of detours) {
        if (origIdx >= d.departIdx && origIdx < d.rejoinIdx) return true;
      }
      return false;
    }

    function addDetour(departIdx, rejoinIdx, coords) {
      if (departIdx >= rejoinIdx) {
        console.log(`[detour] Skipping invalid: depart=${departIdx} >= rejoin=${rejoinIdx}`);
        return false;
      }
      for (const d of detours) {
        if (departIdx < d.rejoinIdx && rejoinIdx > d.departIdx) {
          console.log(`[detour] Skipping overlapping: [${departIdx},${rejoinIdx}] overlaps [${d.departIdx},${d.rejoinIdx}]`);
          return false;
        }
      }
      const entry = { departIdx, rejoinIdx, coords };
      detours.push(entry);
      detours.sort((a, b) => a.departIdx - b.departIdx);
      console.log(`[detour] Added [${departIdx},${rejoinIdx}] (${coords.length} pts). Total detours: ${detours.length}`);
      detours.forEach((d, i) => console.log(`  [${i}] depart=${d.departIdx} rejoin=${d.rejoinIdx} coords=${d.coords.length}`));
      buildEffectiveRoute();
      return true;
    }

    let totalDistVar = routeLength(route);

    /* ── Map Setup ─────────────────────────────── */
    const map = L.map('map', {
      zoomControl: false,
      attributionControl: false,
    }).fitBounds(route.map(p => [p[0], p[1]]), { padding: [30, 30] });

    map.createPane('squadratsOverlay');
    const squadratsPane = map.getPane('squadratsOverlay');
    squadratsPane.style.zIndex = '450';
    squadratsPane.style.pointerEvents = 'none';

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
    }).addTo(map);

    const routeLine = L.polyline(route, {
      color: '#4fc3f7',
      weight: 5,
      opacity: 0.9,
      lineCap: 'round',
    }).addTo(map);

    const travelledLine = L.polyline([], {
      color: '#888',
      weight: 5,
      opacity: 0.5,
      lineCap: 'round',
    }).addTo(map);

    L.marker(route[0], {
      icon: L.divIcon({ className: '', html: '<div class="start-flag">🟢</div>', iconSize: [24, 24], iconAnchor: [12, 12] }),
    }).addTo(map);

    L.marker(route[route.length - 1], {
      icon: L.divIcon({ className: '', html: '<div class="end-flag">🏁</div>', iconSize: [24, 24], iconAnchor: [12, 12] }),
    }).addTo(map);

    let gpsDot = L.marker([0, 0], {
      icon: L.divIcon({
        className: '',
        html: '<div class="gps-pulse"></div><div class="gps-dot"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
      }),
      zIndexOffset: 1000,
    });

    /* ── Pit Stop POI Search ────────────────────── */
    const POI_QUERIES = [
      '["amenity"="cafe"]',
      '["amenity"="fuel"]',
      '["amenity"="restaurant"]',
      '["shop"="convenience"]',
      '["tourism"="viewpoint"]',
    ];
    const POI_SEARCH_RADIUS_M = 1000;
    const POI_MAX_RESULTS = 5;
    let poiMarkers = [];
    let poiActive = false;
    let poiRequestId = 0;
    let currentSnapIdx = 0;

    function escapeHtml(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function sampleRoutePoints(coords, intervalM) {
      if (coords.length === 0) return [];
      const samples = [coords[0]];
      let accumulated = 0;
      for (let i = 1; i < coords.length; i++) {
        accumulated += haversine(coords[i - 1], coords[i]);
        if (accumulated >= intervalM) {
          samples.push(coords[i]);
          accumulated = 0;
        }
      }
      return samples;
    }

    function nearestRouteDistance(coords, point) {
      let bestDist = Infinity;
      let bestRouteDist = 0;
      let bestIdx = 0;
      let accumulated = 0;
      for (let i = 0; i < coords.length; i++) {
        if (i > 0) accumulated += haversine(coords[i - 1], coords[i]);
        const d = haversine(coords[i], point);
        if (d < bestDist) {
          bestDist = d;
          bestRouteDist = accumulated;
          bestIdx = i;
        }
      }
      return { offRouteDist: bestDist, alongRouteDist: bestRouteDist, index: bestIdx };
    }

    function clearPOIMarkers() {
      poiMarkers.forEach(m => map.removeLayer(m));
      poiMarkers = [];
    }

    function renderPOIResults(pois) {
      const resultsEl = document.getElementById('poi-results');
      if (pois.length === 0) {
        resultsEl.innerHTML = '<div class="poi-empty">No pit stops found ahead</div>';
        return;
      }
      resultsEl.innerHTML = pois.map((p, i) => {
        const distKm = p.alongRouteDist / 1000;
        const distLabel = distKm < 1 ? `${Math.round(p.alongRouteDist)} m` : `${distKm.toFixed(1)} km`;
        const offLabel = p.offRouteDist > 50 ? ` · ${Math.round(p.offRouteDist)} m off` : '';
        return `
          <div class="poi-item" data-idx="${i}">
            <span class="poi-rank">${p.icon}</span>
            <div class="poi-info">
              <span class="poi-name">${escapeHtml(p.name)}</span>
              <span class="poi-meta">${distLabel}${offLabel}</span>
            </div>
          </div>`;
      }).join('');

      pois.forEach((p, i) => {
        const marker = L.marker([p.lat, p.lon], {
          icon: L.divIcon({
            className: 'poi-marker-icon',
            html: `<div class="poi-marker">${p.icon}</div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12],
          }),
          zIndexOffset: 1500,
        }).addTo(map);
        marker.bindTooltip(p.name, { direction: 'top', offset: [0, -14] });
        poiMarkers.push(marker);
      });

      resultsEl.querySelectorAll('.poi-item').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.dataset.idx);
          const p = pois[idx];
          if (p) addPitStopDetour(p, el);
        });
      });
    }

    async function addPitStopDetour(poi, cardEl) {
      const origIdx = poi.origRouteIdx;
      const poiPt = [poi.lat, poi.lon];

      const origSnap = snapToRoute([gpsDot.getLatLng().lat, gpsDot.getLatLng().lng], originalRoute);
      let departIdx = Math.max(origSnap.index, currentSnapIdx);
      let routeFrom = originalRoute[departIdx];

      for (const d of detours) {
        if (departIdx >= d.departIdx && departIdx < d.rejoinIdx) {
          departIdx = d.rejoinIdx;
          routeFrom = d.coords[d.coords.length - 1];
        }
      }

      const rejoinIdx = findRejoinIdx(origIdx, 300);
      if (rejoinIdx <= departIdx) return;
      const to = originalRoute[Math.min(rejoinIdx, originalRoute.length - 1)];

      if (cardEl) cardEl.style.opacity = '0.5';

      const detourResult = await fetchDetourRoute([routeFrom, poiPt, to]);
      if (!detourResult) {
        if (cardEl) cardEl.style.opacity = '1';
        return;
      }

      addDetour(departIdx, rejoinIdx, detourResult.coords);

      const pitMarker = L.marker(poiPt, {
        icon: L.divIcon({
          className: 'poi-marker-icon',
          html: `<div class="poi-marker">${poi.icon}</div>`,
          iconSize: [24, 24],
          iconAnchor: [12, 12],
        }),
        zIndexOffset: 1500,
      }).addTo(map);
      pitMarker.bindTooltip(poi.name, { direction: 'top', offset: [0, -14] });
      tempMarkers.push(pitMarker);

      clearPOIMarkers();
      poiPanel.style.display = 'none';
      document.getElementById('btn-poi').classList.remove('active');
      poiActive = false;
      document.getElementById('poi-results').innerHTML = '';
    }

    function poiIcon(tags) {
      if (tags?.tourism === 'viewpoint') return '🏔';
      if (tags?.shop === 'convenience') return '🏪';
      if (tags?.amenity === 'fuel') return '⛽';
      if (tags?.amenity === 'restaurant') return '🍽';
      return '☕';
    }

    async function searchPitStops() {
      const gpsLL = gpsDot.getLatLng();
      const startIdx = (gpsLL.lat === 0 && gpsLL.lng === 0)
        ? 0
        : snapToRoute([gpsLL.lat, gpsLL.lng], originalRoute).index;
      const forward = originalRoute.slice(startIdx);
      if (forward.length < 2) return;

      clearPOIMarkers();
      const reqId = ++poiRequestId;

      const resultsEl = document.getElementById('poi-results');
      resultsEl.innerHTML = '<div class="poi-loading">Searching…</div>';

      const samples = sampleRoutePoints(forward, 2000);
      const unionQueries = POI_QUERIES.map(q =>
        samples.map(([lat, lng]) => `node${q}(around:${POI_SEARCH_RADIUS_M},${lat},${lng});`).join('')
      ).join('');
      const query = `[out:json][timeout:10];(${unionQueries});out body;`;

      try {
        const resp = await fetch('https://overpass-api.de/api/interpreter', {
          method: 'POST',
          body: `data=${encodeURIComponent(query)}`,
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (reqId !== poiRequestId) return;

        const seen = new Set();
        const pois = data.elements
          .filter(el => {
            if (!el.lat || !el.lon) return false;
            if (seen.has(el.id)) return false;
            seen.add(el.id);
            return true;
          })
          .map(el => {
            const { offRouteDist, alongRouteDist, index: fwdIdx } = nearestRouteDistance(forward, [el.lat, el.lon]);
            const name = el.tags?.name || 'Pit stop';
            const origRouteIdx = startIdx + fwdIdx;
            return { id: el.id, lat: el.lat, lon: el.lon, name, offRouteDist, alongRouteDist, origRouteIdx, icon: poiIcon(el.tags) };
          })
          .filter(p => p.offRouteDist <= POI_SEARCH_RADIUS_M)
          .sort((a, b) => a.alongRouteDist - b.alongRouteDist);

        const unique = [];
        for (const p of pois) {
          if (unique.length >= POI_MAX_RESULTS) break;
          const tooClose = unique.some(u => haversine([u.lat, u.lon], [p.lat, p.lon]) < 200);
          if (!tooClose) unique.push(p);
        }
        renderPOIResults(unique);
      } catch (err) {
        console.error('POI search failed:', err);
        if (reqId === poiRequestId) {
          resultsEl.innerHTML = '<div class="poi-empty">Search failed. Try again.</div>';
        }
      }
    }

    const poiPanel = document.getElementById('poi-panel');
    document.getElementById('btn-poi').addEventListener('click', () => {
      const visible = poiPanel.style.display !== 'none';
      if (visible) {
        poiPanel.style.display = 'none';
        document.getElementById('btn-poi').classList.remove('active');
        clearPOIMarkers();
        poiActive = false;
        document.getElementById('poi-results').innerHTML = '';
      } else {
        poiPanel.style.display = '';
        document.getElementById('btn-poi').classList.add('active');
        poiActive = true;
        searchPitStops();
      }
    });

    /* ── Squadrats Overlay ──────────────────────── */
    const SQ_Z = 14, SQINHO_Z = 17;
    let sqSet14 = null, sqSet17 = null;
    let sqDataLoaded = false;
    let sqLayer = null;

    /* ── Tile coord helpers ────────────────────── */
    function lon2tile(lng, z) { return Math.floor((lng + 180) / 360 * (1 << z)); }
    function lat2tile(lat, z) {
      return Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * (1 << z));
    }
    function tile2lon(x, z) { return x / (1 << z) * 360 - 180; }
    function tile2lat(y, z) {
      const n = Math.PI - 2 * Math.PI * y / (1 << z);
      return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
    }
    function tileCenter(key, z) {
      const [x, y] = key.split('-').map(Number);
      return [(tile2lat(y, z) + tile2lat(y + 1, z)) / 2, (tile2lon(x, z) + tile2lon(x + 1, z)) / 2];
    }
    function tileBorderDistToPoint(key, z, pt) {
      const [x, y] = key.split('-').map(Number);
      const north = tile2lat(y, z), south = tile2lat(y + 1, z);
      const west = tile2lon(x, z), east = tile2lon(x + 1, z);
      const clampLat = Math.max(south, Math.min(north, pt[0]));
      const clampLng = Math.max(west, Math.min(east, pt[1]));
      return haversine(pt, [clampLat, clampLng]);
    }
    function nearestBorderPoint(key, z, pt) {
      const [x, y] = key.split('-').map(Number);
      const north = tile2lat(y, z), south = tile2lat(y + 1, z);
      const west = tile2lon(x, z), east = tile2lon(x + 1, z);
      return [Math.max(south, Math.min(north, pt[0])), Math.max(west, Math.min(east, pt[1]))];
    }
    function pointInsideTile(key, z, refPt, insetM) {
      const [x, y] = key.split('-').map(Number);
      const north = tile2lat(y, z), south = tile2lat(y + 1, z);
      const west = tile2lon(x, z), east = tile2lon(x + 1, z);
      const dlat = insetM / 111320;
      const dlng = insetM / (111320 * Math.cos(toRad((north + south) / 2)));
      const lat = Math.max(south + dlat, Math.min(north - dlat, refPt[0]));
      const lng = Math.max(west + dlng, Math.min(east - dlng, refPt[1]));
      return [lat, lng];
    }

    /* ── SQ stats state ───────────────────────── */
    const sqStatsEl = document.getElementById('sq-stats');
    const sqCapturedEl = document.getElementById('sq-captured');
    const sqOnRouteEl = document.getElementById('sq-on-route');
    const inhoCapturedEl = document.getElementById('inho-captured');
    let sqCapturedCount = 0, inhoCapturedCount = 0;
    let sqOnRouteSet = new Set();
    const capturedSet14 = new Set(), capturedSet17 = new Set();

    function computeSqOnRoute() {
      sqOnRouteSet = new Set();
      if (!sqSet14) return;
      for (const pt of route) {
        const key = `${lon2tile(pt[1], SQ_Z)}-${lat2tile(pt[0], SQ_Z)}`;
        if (!sqSet14.has(key) && !capturedSet14.has(key)) sqOnRouteSet.add(key);
      }
    }

    function updateSqStats() {
      sqCapturedEl.textContent = sqCapturedCount;
      sqOnRouteEl.textContent = sqOnRouteSet.size;
      inhoCapturedEl.textContent = inhoCapturedCount;
    }

    let captureToastTimer = null;
    const captureToastEl = document.getElementById('capture-toast');

    function showCaptureToast(newSq, newInho) {
      const parts = [];
      if (newSq) parts.push(`<span class="sq-color">+${newSq} SQ</span>`);
      if (newInho) parts.push(`<span class="inho-color">+${newInho} inho</span>`);
      if (!parts.length) return;
      captureToastEl.innerHTML = parts.join(' ');
      captureToastEl.classList.add('show');
      clearTimeout(captureToastTimer);
      captureToastTimer = setTimeout(() => captureToastEl.classList.remove('show'), 1200);
    }

    function checkSqCapture(cur) {
      if (!sqSet14 && !sqSet17) return;
      let newSq = 0, newInho = 0;
      if (sqSet14) {
        const key14 = `${lon2tile(cur[1], SQ_Z)}-${lat2tile(cur[0], SQ_Z)}`;
        if (!sqSet14.has(key14) && !capturedSet14.has(key14)) {
          capturedSet14.add(key14);
          sqSet14.add(key14);
          sqCapturedCount++;
          sqOnRouteSet.delete(key14);
          newSq++;
        }
      }
      if (sqSet17) {
        const key17 = `${lon2tile(cur[1], SQINHO_Z)}-${lat2tile(cur[0], SQINHO_Z)}`;
        if (!sqSet17.has(key17) && !capturedSet17.has(key17)) {
          capturedSet17.add(key17);
          sqSet17.add(key17);
          inhoCapturedCount++;
          newInho++;
        }
      }
      if ((newSq || newInho) && sqLayer) sqLayer.redraw();
      if (newSq || newInho) {
        showCaptureToast(newSq, newInho);
        if (sqOppEnabled) {
          oppRouteCache.clear();
          lastScanTime = 0;
        }
      }
      updateSqStats();
    }

    /* ── Overlay rendering ────────────────────── */
    function drawUnvisited(ctx, tx, ty, z, sz, sqZ, rawSet, color, alpha) {
      const s = 1 << (sqZ - z), cell = sz / s;
      if (cell < 0.5) return;
      const x0 = Math.floor(tx * s), y0 = Math.floor(ty * s);
      const x1 = Math.ceil((tx + 1) * s) - 1, y1 = Math.ceil((ty + 1) * s) - 1;
      ctx.fillStyle = color;
      ctx.globalAlpha = alpha;
      for (let x = x0; x <= x1; x++)
        for (let y = y0; y <= y1; y++)
          if (!rawSet.has(`${x}-${y}`))
            ctx.fillRect((x - tx * s) * cell, (y - ty * s) * cell, cell, cell);
      ctx.globalAlpha = 1;
    }

    function drawBorders(ctx, tx, ty, z, sz, sqZ, rawSet, color, lw, alpha) {
      const s = 1 << (sqZ - z), cell = sz / s;
      if (cell < 3) return;
      const x0 = Math.floor(tx * s) - 1, y0 = Math.floor(ty * s) - 1;
      const x1 = Math.ceil((tx + 1) * s), y1 = Math.ceil((ty + 1) * s);
      ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.globalAlpha = alpha;
      ctx.beginPath();
      for (let x = x0; x <= x1; x++)
        for (let y = y0; y <= y1; y++) {
          if (rawSet.has(`${x}-${y}`)) continue;
          const px = (x - tx * s) * cell, py = (y - ty * s) * cell;
          if (rawSet.has(`${x}-${y-1}`)) { ctx.moveTo(px, py); ctx.lineTo(px + cell, py); }
          if (rawSet.has(`${x}-${y+1}`)) { ctx.moveTo(px, py + cell); ctx.lineTo(px + cell, py + cell); }
          if (rawSet.has(`${x-1}-${y}`)) { ctx.moveTo(px, py); ctx.lineTo(px, py + cell); }
          if (rawSet.has(`${x+1}-${y}`)) { ctx.moveTo(px + cell, py); ctx.lineTo(px + cell, py + cell); }
        }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function addSqLayer() {
      if (!sqSet14 && !sqSet17) return;
      const SqLayer = L.GridLayer.extend({
        options: { tileSize: 256, pane: 'squadratsOverlay', zIndex: 10 },
        createTile(coords, done) {
          const c = document.createElement('canvas');
          const dpr = window.devicePixelRatio || 1;
          const sz = this.getTileSize();
          c.width = sz.x * dpr; c.height = sz.y * dpr;
          c.style.width = `${sz.x}px`; c.style.height = `${sz.y}px`;
          const g = c.getContext('2d');
          g.scale(dpr, dpr);
          setTimeout(() => {
            if (sqSet14) {
              drawUnvisited(g, coords.x, coords.y, coords.z, sz.x, SQ_Z, sqSet14, '#663399', 0.32);
              drawBorders(g, coords.x, coords.y, coords.z, sz.x, SQ_Z, sqSet14, '#663399', 1, 0.45);
            }
            if (sqSet17) {
              drawUnvisited(g, coords.x, coords.y, coords.z, sz.x, SQINHO_Z, sqSet17, '#996633', 0.22);
              drawBorders(g, coords.x, coords.y, coords.z, sz.x, SQINHO_Z, sqSet17, '#996633', 0.5, 0.4);
            }
            done(null, c);
          }, 0);
          return c;
        }
      });
      sqLayer = new SqLayer().addTo(map);
    }

    /* ── Opportunity scanning ─────────────────── */
    let opportunities = [];
    let lastScanTime = 0;
    const oppStrip = document.getElementById('opp-strip');
    const tempMarkers = [];
    const dismissedOppKeys = new Set();
    const oppRouteCache = new Map();
    const MAX_DETOUR_EXTRA_M = 500;

    function findAdjacentUnvisited(key, z, rawSet, capturedSet, maxTiles) {
      const cluster = [key];
      const checked = new Set([key]);
      const queue = [key];
      while (queue.length > 0 && cluster.length < maxTiles) {
        const cur = queue.shift();
        const [cx, cy] = cur.split('-').map(Number);
        for (const [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          if (cluster.length >= maxTiles) break;
          const nk = `${cx+dx}-${cy+dy}`;
          if (checked.has(nk)) continue;
          checked.add(nk);
          if (!rawSet.has(nk) && !capturedSet.has(nk)) {
            cluster.push(nk);
            queue.push(nk);
          }
        }
      }
      return cluster;
    }

    function findRejoinIdx(fromIdx, minDistM) {
      let acc = 0;
      for (let i = fromIdx; i < originalRoute.length - 1; i++) {
        acc += haversine(originalRoute[i], originalRoute[i + 1]);
        if (acc >= minDistM) return Math.min(i + 1, originalRoute.length - 1);
      }
      return originalRoute.length - 1;
    }

    function sortNearestNeighbor(start, points) {
      const remaining = [...points];
      const ordered = [];
      let cur = start;
      while (remaining.length > 0) {
        let best = 0, bestDist = haversine(cur, remaining[0]);
        for (let i = 1; i < remaining.length; i++) {
          const d = haversine(cur, remaining[i]);
          if (d < bestDist) { best = i; bestDist = d; }
        }
        ordered.push(remaining[best]);
        cur = remaining[best];
        remaining.splice(best, 1);
      }
      return ordered;
    }

    function scanOpportunities(origSnapIdx) {
      if (!sqSet14 && !sqSet17) return;
      lastScanSnapIdx = origSnapIdx;
      const scanStart = origSnapIdx;
      if (scanStart >= originalRoute.length - 1) return;
      const redOpps = [];
      const yellowCandidates = [];

      function scanZoom(z, rawSet, capturedSet, label) {
        const seen = new Set();
        let acc = 0;
        for (let i = scanStart; i < originalRoute.length - 1 && acc < 1500; i++) {
          if (isInDetourRange(i)) continue;
          acc += haversine(originalRoute[i], originalRoute[i + 1]);
          const tx = lon2tile(originalRoute[i][1], z);
          const ty = lat2tile(originalRoute[i][0], z);
          for (let dx = -1; dx <= 1; dx++)
            for (let dy = -1; dy <= 1; dy++) {
              const key = `${tx + dx}-${ty + dy}`;
              if (seen.has(key) || rawSet.has(key) || capturedSet.has(key) || dismissedOppKeys.has(key)) continue;
              seen.add(key);
              const borderDist = tileBorderDistToPoint(key, z, originalRoute[i]);

              let closestRouteIdx = i;
              let minRouteDist = Infinity;
              const searchEnd = Math.min(i + 50, originalRoute.length);
              for (let j = i; j < searchEnd; j++) {
                const d = haversine(tileCenter(key, z), originalRoute[j]);
                if (d < minRouteDist) { minRouteDist = d; closestRouteIdx = j; }
              }

              if (borderDist <= 20) {
                redOpps.push({ type: 'red', key, z, tiles: 1, dist: Math.round(borderDist),
                  label: `🚶 ${Math.round(borderDist)}m +1 ${label}`,
                  borderPt: nearestBorderPoint(key, z, originalRoute[closestRouteIdx]),
                  routeIdx: closestRouteIdx, tileLabel: label });
              } else if (minRouteDist < 800) {
                const cluster = findAdjacentUnvisited(key, z, rawSet, capturedSet, 3);
                const viaPoints = sortNearestNeighbor(originalRoute[closestRouteIdx], cluster.map(k => pointInsideTile(k, z, originalRoute[closestRouteIdx], 5)));
                const rejoinIdx = findRejoinIdx(closestRouteIdx, Math.max(300, minRouteDist * 2));
                yellowCandidates.push({ type: 'yellow', key, z, keys: cluster, tiles: cluster.length,
                  dist: Math.round(2 * minRouteDist * 1.4),
                  label: `+${Math.round(2 * minRouteDist * 1.4)}m +${cluster.length} ${label}`,
                  viaPoints, routeIdx: closestRouteIdx,
                  rejoinIdx, tileLabel: label, rawSet, capturedSet });
              }
            }
        }
      }

      if (sqSet14) scanZoom(SQ_Z, sqSet14, capturedSet14, 'SQ');
      if (sqSet17) scanZoom(SQINHO_Z, sqSet17, capturedSet17, 'inho');

      const validatedYellows = [];
      const toValidate = [];

      for (const opp of yellowCandidates) {
        const cached = oppRouteCache.get(opp.key);
        if (cached?.status === 'ok') {
          opp.dist = Math.round(cached.extraDist);
          opp.tiles = cached.tiles;
          opp.label = `+${opp.dist}m +${opp.tiles} ${opp.tileLabel}`;
          validatedYellows.push(opp);
        } else if (cached?.status === 'failed') {
          continue;
        } else if (!cached) {
          toValidate.push(opp);
        }
      }

      opportunities = [...redOpps, ...validatedYellows]
        .sort((a, b) => {
          if (a.type !== b.type) return a.type === 'red' ? -1 : 1;
          return (b.tiles / Math.max(b.dist, 1)) - (a.tiles / Math.max(a.dist, 1));
        })
        .slice(0, 1);
      renderOppCards();

      if (toValidate.length) {
        console.log(`[opp] Scan at idx ${origSnapIdx}: ${redOpps.length} red, ${validatedYellows.length} validated yellow, ${toValidate.length} to validate`);
      }

      for (const opp of toValidate) {
        oppRouteCache.set(opp.key, { status: 'pending' });
        validateYellowOpp(opp, origSnapIdx);
      }
    }

    let lastScanSnapIdx = 0;

    async function validateYellowOpp(opp, snapIdx) {
      const from = originalRoute[opp.routeIdx];
      const to = originalRoute[opp.rejoinIdx];
      const waypoints = [from, ...opp.viaPoints, to];

      console.log(`[opp] Validating yellow: ${opp.key} (${opp.tiles} tiles, via ${waypoints.length} pts)`);
      const detourResult = await fetchDetourRoute(waypoints);
      if (!detourResult) {
        console.log(`[opp] Failed: ${opp.key} — no route found`);
        oppRouteCache.set(opp.key, { status: 'failed' });
        return;
      }

      const directDist = routeLength(originalRoute.slice(opp.routeIdx, opp.rejoinIdx + 1));
      const extraDist = detourResult.distance - directDist;

      const maxExtra = MAX_DETOUR_EXTRA_M * opp.tiles;
      if (extraDist > maxExtra) {
        console.log(`[opp] Failed: ${opp.key} — extra ${Math.round(extraDist)}m > ${maxExtra}m (${opp.tiles} tiles)`);
        oppRouteCache.set(opp.key, { status: 'failed' });
        return;
      }

      console.log(`[opp] Validated: ${opp.key} — +${Math.round(extraDist)}m for ${opp.tiles} tiles (limit ${maxExtra}m)`);
      oppRouteCache.set(opp.key, {
        status: 'ok',
        extraDist: Math.max(0, extraDist),
        tiles: opp.tiles,
        routeIdx: opp.routeIdx,
        rejoinIdx: opp.rejoinIdx,
      });

      scanOpportunities(lastScanSnapIdx);
    }

    /* ── Opportunity card rendering ───────────── */
    const shownOppKeys = new Set();
    let renderedOppSignature = '';
    const oppDotMarkers = [];

    function renderOppCards(force) {
      const sig = opportunities.map(o => `${o.key}:${o.type}:${o.label}`).join('|');
      if (!force && sig === renderedOppSignature) return;
      const hadNew = sig !== renderedOppSignature;
      renderedOppSignature = sig;

      oppDotMarkers.forEach(m => map.removeLayer(m));
      oppDotMarkers.length = 0;

      oppStrip.innerHTML = '';
      const currentKeys = new Set();
      const dotPoints = [];
      for (const opp of opportunities) {
        currentKeys.add(opp.key);
        const isNew = !shownOppKeys.has(opp.key);
        const card = document.createElement('div');
        card.className = `opp-card ${opp.type}${isNew ? ' new' : ''}`;
        const label = document.createElement('span');
        label.textContent = opp.label;
        card.appendChild(label);
        const btn = document.createElement('button');
        btn.className = 'opp-btn';
        btn.textContent = 'Capture';
        btn.addEventListener('click', (e) => { e.stopPropagation(); handleOppTap(opp); });
        card.appendChild(btn);
        oppStrip.appendChild(card);
        if (isNew) card.addEventListener('animationend', () => card.classList.remove('new'));

        const dotPos = opp.borderPt || opp.viaPoints?.[0] || tileCenter(opp.key, opp.z);
        const dot = L.marker(dotPos, {
          icon: L.divIcon({
            className: '',
            html: `<div class="opp-dot ${opp.type}"></div>`,
            iconSize: [12, 12], iconAnchor: [6, 6],
          }),
          zIndexOffset: 600,
          interactive: false,
        }).addTo(map);
        oppDotMarkers.push(dot);
        dotPoints.push(dotPos);
      }
      shownOppKeys.clear();
      currentKeys.forEach(k => shownOppKeys.add(k));

      if (hadNew && dotPoints.length > 0 && following) {
        const curPos = gpsDot.getLatLng();
        const pts = [[curPos.lat, curPos.lng], ...dotPoints];
        const bounds = L.latLngBounds(pts.map(p => L.latLng(p[0], p[1])));
        const currentBounds = map.getBounds();
        if (!currentBounds.contains(bounds)) {
          map.fitBounds(bounds, { padding: [40, 40], maxZoom: map.getZoom(), animate: !devMode });
        }
      }
    }

    /* ── BRouter detour fetch ─────────────────── */
    async function tryBRouterRoute(waypoints) {
      const lonlats = waypoints.map(p => `${p[1]},${p[0]}`).join('|');
      const profiles = ['trekking', 'hiking-mountain'];
      for (const profile of profiles) {
        try {
          const url = `https://brouter.de/brouter?lonlats=${lonlats}&profile=${profile}&alternativeidx=0&format=geojson`;
          const r = await fetch(url);
          if (!r.ok) continue;
          const gj = await r.json();
          const coords = gj.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
          const dist = routeLength(coords);
          return { coords, distance: dist };
        } catch { /* try next profile */ }
      }
      return null;
    }

    async function fetchDetourRoute(waypoints) {
      const result = await tryBRouterRoute(waypoints);
      if (result) return result;

      if (waypoints.length > 3) {
        const from = waypoints[0], to = waypoints[waypoints.length - 1];
        const vias = waypoints.slice(1, -1);
        const centroid = [
          vias.reduce((s, p) => s + p[0], 0) / vias.length,
          vias.reduce((s, p) => s + p[1], 0) / vias.length,
        ];
        return tryBRouterRoute([from, centroid, to]);
      }
      return null;
    }

    /* ── Handle opportunity tap ────────────────── */
    async function handleOppTap(opp) {
      console.log(`[opp] Tap: ${opp.key}, type=${opp.type}`);
      const idx = opportunities.findIndex(o => o.key === opp.key);
      if (idx === -1) {
        console.log(`[opp] Key ${opp.key} not found in opportunities, ignoring`);
        opportunities = opportunities.filter(o => o.key !== opp.key);
        renderOppCards(true);
        return;
      }

      if (opp.type === 'red') {
        if (opp.borderPt) {
          const dist = opp.dist;
          const marker = L.marker(opp.borderPt, {
            icon: L.divIcon({
              className: '',
              html: `<div class="walk-marker">🛑 ${dist}m</div>`,
              iconSize: [60, 20], iconAnchor: [30, 10],
            }),
            zIndexOffset: 800,
          }).addTo(map);
          tempMarkers.push(marker);
        }
        dismissedOppKeys.add(opp.key);
        opportunities.splice(idx, 1);
        renderOppCards(true);
        return;
      }

      const cached = oppRouteCache.get(opp.key);
      if (!cached || cached.status !== 'ok') {
        console.log(`[opp] Cache miss for ${opp.key}: ${cached ? cached.status : 'null'}`);
        opportunities.splice(idx, 1);
        renderOppCards(true);
        return;
      }

      const currentPos = gpsDot.getLatLng();
      const curPt = [currentPos.lat, currentPos.lng];

      const card = oppStrip.children[idx];
      if (card) card.querySelector('.opp-btn').textContent = '…';

      let activeDetour = null;
      let bestDetourDist = Infinity;
      for (const d of detours) {
        const s = snapToRoute(curPt, d.coords);
        if (s.distance < bestDetourDist) {
          bestDetourDist = s.distance;
          activeDetour = d;
        }
      }
      const origSnap = snapToRoute(curPt, originalRoute);
      let departIdx;
      let routeFrom;
      if (activeDetour && bestDetourDist <= origSnap.distance) {
        departIdx = activeDetour.rejoinIdx;
        routeFrom = activeDetour.coords[activeDetour.coords.length - 1];
      } else {
        activeDetour = null;
        departIdx = origSnap.index;
        routeFrom = curPt;
        for (const d of detours) {
          if (departIdx >= d.departIdx && departIdx < d.rejoinIdx) {
            departIdx = d.rejoinIdx;
            routeFrom = d.coords[d.coords.length - 1];
          }
        }
      }
      const rejoinIdx = Math.max(cached.rejoinIdx, departIdx + 1);
      const to = originalRoute[Math.min(rejoinIdx, originalRoute.length - 1)];
      const viaPoints = opp.viaPoints || [];
      const detourResult = await fetchDetourRoute([routeFrom, ...viaPoints, to]);

      if (!detourResult) {
        console.log(`[opp] Detour from current position failed`);
        if (card) card.querySelector('.opp-btn').textContent = '✗';
        setTimeout(() => { opportunities.splice(idx, 1); renderOppCards(true); }, 1500);
        return;
      }

      console.log(`[opp] Adding detour: depart=${departIdx}, rejoin=${rejoinIdx}, coords=${detourResult.coords.length} pts`);
      addDetour(departIdx, rejoinIdx, detourResult.coords);

      if (opp.keys) opp.keys.forEach(k => dismissedOppKeys.add(k));
      else dismissedOppKeys.add(opp.key);

      opportunities.splice(idx, 1);
      renderOppCards(true);
    }

    function dismissPassedOpps(origSnapIdx) {
      const before = opportunities.length;
      opportunities = opportunities.filter(o => o.routeIdx > origSnapIdx - 5);
      if (opportunities.length !== before) renderOppCards(true);

      const curPt = originalRoute[origSnapIdx];
      for (let i = tempMarkers.length - 1; i >= 0; i--) {
        const ml = tempMarkers[i].getLatLng();
        if (haversine([ml.lat, ml.lng], curPt) > 200) continue;
        const markerSnap = snapToRoute([ml.lat, ml.lng], originalRoute);
        if (markerSnap.index < origSnapIdx) {
          map.removeLayer(tempMarkers[i]);
          tempMarkers.splice(i, 1);
        }
      }
    }

    /* ── Squadrats data loading ────────────────── */
    async function loadSquadratsForUid(uid) {
      const servers = ['https://mainframe-proxy-01.squadrats.com', 'https://mainframe-proxy-02.squadrats.com'];
      for (const base of servers) {
        try {
          const r = await fetch(`${base}/anonymous/squadrants/${uid}?planner=strava`);
          if (!r.ok) continue;
          const d = await r.json();
          if (d?.raw) {
            sqSet14 = d.raw[14] ? new Set(Array.isArray(d.raw[14]) ? d.raw[14] : Object.keys(d.raw[14])) : null;
            sqSet17 = d.raw[17] ? new Set(Array.isArray(d.raw[17]) ? d.raw[17] : Object.keys(d.raw[17])) : null;
            sqDataLoaded = true;
            if (sqLayer) map.removeLayer(sqLayer);
            addSqLayer();
            computeSqOnRoute();
            updateSqStats();
            sqStatsEl.style.display = 'flex';
            document.getElementById('btn-sq-opp').style.display = '';
            return true;
          }
        } catch { /* try next or skip */ }
      }
      return false;
    }

    if (hashParams.uid) {
      loadSquadratsForUid(hashParams.uid);
    }

    /* ── State ─────────────────────────────────── */
    let following = true;
    let headingUp = false;
    let currentBearing = 0;
    let filteredBearing = null;
    let wakeLock = null;
    let startTime = null;
    let lastPositions = [];
    let sqOppEnabled = false;
    let gpsTrackPath = [];
    let gpsTrackLengthM = 0;
    let rideMovingMs = 0;
    let lastPositionTickTime = null;
    const TRACK_MIN_SEGMENT_M = 2;
    const RIDE_MOVING_MIN_MPS = 0.5;
    const ETA_MIN_SPEED_MPS = 0.5;
    const MAP_HEADING_UP_MIN_MPS = 1.2;
    let lastSpeedMps = 0;

    const distEl = document.getElementById('dist-remaining');
    const etaEl = document.getElementById('eta');
    const progEl = document.getElementById('progress');
    const coveredEl = document.getElementById('dist-covered');
    const elapsedEl = document.getElementById('elapsed');
    const avgSpeedEl = document.getElementById('avg-speed');
    const curSpeedEl = document.getElementById('cur-speed');
    const arrowEl = document.getElementById('compass-arrow');

    function formatDist(m) {
      return m < 1000 ? `${Math.round(m)} m` : `${(m / 1000).toFixed(1)} km`;
    }

    function formatTime(mins) {
      if (mins < 60) return `${mins} min`;
      const h = Math.floor(mins / 60), m = mins % 60;
      return `${h}h ${m}m`;
    }

    function formatEtaArrival(etaMs) {
      const totalMins = Math.max(1, Math.round(etaMs / 60000));
      const arrival = new Date(Date.now() + etaMs);
      const hh = arrival.getHours();
      const mm = String(arrival.getMinutes()).padStart(2, '0');
      const minsWord = totalMins === 1 ? '1 min' : `${totalMins} mins`;
      return `${hh}:${mm} (${minsWord})`;
    }

    function shortestAngleDelta(fromDeg, toDeg) {
      let diff = toDeg - fromDeg;
      if (diff > 180) diff -= 360;
      if (diff < -180) diff += 360;
      return diff;
    }

    function smoothBearing(targetDeg, speedMps) {
      if (filteredBearing == null) {
        filteredBearing = targetDeg;
        return filteredBearing;
      }

      const delta = shortestAngleDelta(filteredBearing, targetDeg);
      const deadbandDeg = speedMps < 1 ? 7 : 3;
      if (Math.abs(delta) < deadbandDeg) return filteredBearing;

      const alpha = speedMps < 1 ? 0.18 : 0.35;
      filteredBearing = (filteredBearing + delta * alpha + 360) % 360;
      return filteredBearing;
    }

    /* ── GPS Tracking ──────────────────────────── */
    if (!devMode) {
      if (!navigator.geolocation) {
        showError('GPS Unavailable', 'Your browser does not support geolocation.');
      } else {
        navigator.geolocation.watchPosition(onPosition, onGpsError, {
          enableHighAccuracy: true,
          maximumAge: 3000,
          timeout: 15000,
        });
      }
    }

    function onPosition(pos) {
      const now = Date.now();
      if (!startTime) startTime = now;

      const cur = [pos.coords.latitude, pos.coords.longitude];
      gpsDot.setLatLng(cur);
      if (!map.hasLayer(gpsDot)) gpsDot.addTo(map);

      const gpsSpeed = pos.coords.speed;
      let speedMpsForRotation = 0;
      if (gpsSpeed != null && gpsSpeed >= 0) {
        speedMpsForRotation = gpsSpeed;
        curSpeedEl.textContent = `${(gpsSpeed * 3.6).toFixed(1)}`;
      } else {
        lastPositions.push({ pos: cur, time: now });
        if (lastPositions.length > 5) lastPositions.shift();
        if (lastPositions.length >= 2) {
          const first = lastPositions[0], last = lastPositions[lastPositions.length - 1];
          const dt = (last.time - first.time) / 1000;
          if (dt > 2) {
            const ds = haversine(first.pos, last.pos);
            speedMpsForRotation = ds / dt;
            curSpeedEl.textContent = `${(ds / dt * 3.6).toFixed(1)}`;
          } else {
            curSpeedEl.textContent = '—';
          }
        } else {
          curSpeedEl.textContent = '—';
        }
      }
      lastSpeedMps = speedMpsForRotation;

      if (lastPositionTickTime != null) {
        const dtTick = Math.min(now - lastPositionTickTime, 5000);
        if (speedMpsForRotation >= RIDE_MOVING_MIN_MPS) rideMovingMs += dtTick;
      }
      lastPositionTickTime = now;

      if (gpsTrackPath.length === 0) {
        gpsTrackPath.push(cur);
      } else {
        const lastPt = gpsTrackPath[gpsTrackPath.length - 1];
        const seg = haversine(lastPt, cur);
        if (seg >= TRACK_MIN_SEGMENT_M) {
          gpsTrackLengthM += seg;
          gpsTrackPath.push(cur);
        }
      }

      const snap = snapToRoute(cur, route);
      currentSnapIdx = snap.index;
      const remaining = routeLength(route.slice(snap.index));

      const trail = [...gpsTrackPath];
      if (trail.length === 0) {
        travelledLine.setLatLngs([cur]);
      } else {
        const lastTrail = trail[trail.length - 1];
        if (trail.length === 1 || haversine(lastTrail, cur) > 0.3) trail.push(cur);
        travelledLine.setLatLngs(trail);
      }

      const denomProgress = gpsTrackLengthM + remaining;
      const pct = remaining < 30 ? 100 : (denomProgress > 0 ? Math.min(100, Math.round((gpsTrackLengthM / denomProgress) * 100)) : 0);

      distEl.textContent = formatDist(remaining);
      coveredEl.textContent = formatDist(gpsTrackLengthM);
      progEl.textContent = `${pct}%`;

      const elapsedMinsMoving = Math.round(rideMovingMs / 60000);
      elapsedEl.textContent = formatTime(Math.max(0, elapsedMinsMoving));

      const avgKmh = rideMovingMs > 10000 ? (gpsTrackLengthM / 1000) / (rideMovingMs / 3600000) : 0;
      avgSpeedEl.textContent = avgKmh > 0.5 ? `${avgKmh.toFixed(1)}` : '—';

      let rawBrng;
      const HEADING_UPDATE_MIN_SPEED_MPS = 0.4;
      if (gpsTrackPath.length >= 2) {
        const a = gpsTrackPath[gpsTrackPath.length - 2];
        const b = gpsTrackPath[gpsTrackPath.length - 1];
        if (haversine(a, b) >= 1) rawBrng = bearing(a, b);
      }
      if (rawBrng == null && pos.coords.heading != null && !Number.isNaN(pos.coords.heading) && speedMpsForRotation >= HEADING_UPDATE_MIN_SPEED_MPS) {
        rawBrng = pos.coords.heading;
      }
      if (rawBrng == null) {
        const nextIdx = Math.min(snap.index + 3, route.length - 1);
        rawBrng = bearing(cur, route[nextIdx]);
      }
      if (speedMpsForRotation >= HEADING_UPDATE_MIN_SPEED_MPS || filteredBearing == null) {
        currentBearing = smoothBearing(rawBrng, speedMpsForRotation);
      }

      if (remaining >= 30 && speedMpsForRotation >= ETA_MIN_SPEED_MPS) {
        const etaMs = (remaining / speedMpsForRotation) * 1000;
        etaEl.textContent = formatEtaArrival(etaMs);
      } else if (remaining >= 30) {
        etaEl.textContent = '—';
      }

      const mapHeadingUp = headingUp && speedMpsForRotation >= MAP_HEADING_UP_MIN_MPS;
      if (mapHeadingUp) {
        arrowEl.style.transform = 'rotate(0deg)';
        rotateMap(currentBearing, true);
      } else {
        arrowEl.style.transform = `rotate(${currentBearing}deg)`;
        rotateMap(0);
      }

      if (sqDataLoaded) {
        checkSqCapture(cur);
        if (sqOppEnabled) {
          const origSnap = snapToRoute(cur, originalRoute);
          const now2 = Date.now();
          if (now2 - lastScanTime > 5000) {
            lastScanTime = now2;
            scanOpportunities(origSnap.index);
          }
          dismissPassedOpps(origSnap.index);
        }
      }

      if (remaining < 30) {
        distEl.textContent = 'Arrived';
        etaEl.textContent = '—';
        arrowEl.style.transform = 'rotate(0deg)';
        rotateMap(0);
      }

      if (following) {
        const zoom = Math.max(map.getZoom(), 16);
        const anim = !devMode;
        if (headingUp && speedMpsForRotation >= MAP_HEADING_UP_MIN_MPS) {
          const point = map.project(L.latLng(cur[0], cur[1]), zoom);
          const offsetPx = map.getSize().y * 0.25;
          const bRad = toRad(currentBearing);
          point.x += Math.sin(bRad) * offsetPx;
          point.y -= Math.cos(bRad) * offsetPx;
          const center = map.unproject(point, zoom);
          map.setView(center, zoom, { animate: anim });
        } else {
          map.setView(cur, zoom, { animate: anim });
        }
      }
    }

    function onGpsError(err) {
      console.warn('GPS error:', err.message);
      distEl.textContent = '—';
    }

    /* ── Map Rotation ──────────────────────────── */
    const _mapPane = map.getPane('mapPane');
    let _mapRotation = 0;
    const _origSetTransform = L.DomUtil.setTransform;

    L.DomUtil.setTransform = function(el, offset, scale) {
      if (_mapRotation !== 0 && el === _mapPane) {
        const sz = map.getSize();
        const cx = sz.x / 2, cy = sz.y / 2;
        const pos = offset || new L.Point(0, 0);
        el.style.transform =
          `translate(${cx}px,${cy}px) rotate(${-_mapRotation}deg) translate(${-cx}px,${-cy}px) translate3d(${pos.x}px,${pos.y}px,0)` +
          (scale ? ` scale(${scale})` : '');
        return;
      }
      _origSetTransform.call(L.DomUtil, el, offset, scale);
      if (_mapRotation !== 0 && el.classList && el.classList.contains('leaflet-marker-icon')) {
        el.style.transformOrigin = 'center center';
        el.style.transform += ` rotate(${_mapRotation}deg)`;
      }
    };

    const MAX_DEG_PER_SEC = 120;
    let _rotTarget = 0;
    let _rotAnimFrame = null;
    let _rotLastTime = 0;

    function applyMapRotationTransform() {
      const pos = L.DomUtil.getPosition(_mapPane) || new L.Point(0, 0);
      L.DomUtil.setTransform(_mapPane, pos);

      const r = _mapRotation;
      document.querySelectorAll('.leaflet-marker-icon').forEach(el => {
        el.style.transformOrigin = 'center center';
        const existing = el.style.transform.replace(/\s*rotate\([^)]*\)/g, '');
        el.style.transform = r !== 0 ? `${existing} rotate(${r}deg)` : existing;
      });
    }

    function rotateMap(deg, immediate = false) {
      _rotTarget = deg;
      if (immediate) {
        _mapRotation = ((_rotTarget % 360) + 360) % 360;
        if (_rotAnimFrame) {
          cancelAnimationFrame(_rotAnimFrame);
          _rotAnimFrame = null;
        }
        applyMapRotationTransform();
        return;
      }
      if (!_rotAnimFrame) {
        _rotLastTime = performance.now();
        _rotAnimFrame = requestAnimationFrame(animateRotation);
      }
    }

    function animateRotation(now) {
      const dt = (now - _rotLastTime) / 1000;
      _rotLastTime = now;

      let diff = _rotTarget - _mapRotation;
      if (diff > 180) diff -= 360;
      if (diff < -180) diff += 360;

      const maxStep = MAX_DEG_PER_SEC * dt;
      if (Math.abs(diff) <= maxStep) {
        _mapRotation = _rotTarget;
        _rotAnimFrame = null;
      } else {
        _mapRotation += Math.sign(diff) * maxStep;
        _rotAnimFrame = requestAnimationFrame(animateRotation);
      }

      _mapRotation = ((_mapRotation % 360) + 360) % 360;

      applyMapRotationTransform();
    }

    /* ── Controls ──────────────────────────────── */
    const centerBtn = document.getElementById('btn-center');
    const orientBtn = document.getElementById('btn-orient');
    const lockBtn = document.getElementById('btn-lock');

    centerBtn.addEventListener('click', () => {
      following = true;
      centerBtn.classList.add('active');
      const ll = gpsDot.getLatLng();
      if (ll.lat !== 0 || ll.lng !== 0) {
        const zoom = Math.max(map.getZoom(), 16);
        if (headingUp && lastSpeedMps >= MAP_HEADING_UP_MIN_MPS) {
          const point = map.project(ll, zoom);
          const offsetPx = map.getSize().y * 0.25;
          const bRad = toRad(currentBearing);
          point.x += Math.sin(bRad) * offsetPx;
          point.y -= Math.cos(bRad) * offsetPx;
          map.setView(map.unproject(point, zoom), zoom, { animate: true });
        } else {
          map.setView(ll, zoom, { animate: true });
        }
      }
    });

    orientBtn.addEventListener('click', () => {
      headingUp = !headingUp;
      orientBtn.classList.toggle('active', headingUp);
      orientBtn.textContent = headingUp ? '⇧' : 'N';
      if (headingUp) {
        if (lastSpeedMps >= MAP_HEADING_UP_MIN_MPS) {
          rotateMap(currentBearing || 0);
          arrowEl.style.transform = 'rotate(0deg)';
        } else {
          rotateMap(0);
          arrowEl.style.transform = `rotate(${currentBearing || 0}deg)`;
        }
      } else {
        rotateMap(0);
        arrowEl.style.transform = `rotate(${currentBearing || 0}deg)`;
      }
    });

    map.on('dragstart', () => {
      following = false;
      centerBtn.classList.remove('active');
    });

    async function requestWakeLock() {
      if (wakeLock) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        lockBtn.classList.add('active');
        wakeLock.addEventListener('release', () => {
          wakeLock = null;
          lockBtn.classList.remove('active');
        });
      } catch (e) {
        console.warn('Wake Lock not supported:', e);
      }
    }

    lockBtn.addEventListener('click', async () => {
      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
        lockBtn.classList.remove('active');
        return;
      }
      await requestWakeLock();
    });

    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });

    const sqOppBtn = document.getElementById('btn-sq-opp');
    sqOppBtn.addEventListener('click', () => {
      sqOppEnabled = !sqOppEnabled;
      sqOppBtn.classList.toggle('active', sqOppEnabled);
      if (sqOppEnabled) {
        lastScanTime = 0;
      } else {
        opportunities.length = 0;
        renderOppCards(true);
        oppRouteCache.clear();
      }
    });

    /* ── Dev Mode ──────────────────────────────── */
    if (devMode) {
      document.getElementById('dev-banner').style.display = '';
      const devWrap = document.getElementById('dev-slider-wrap');
      devWrap.style.display = 'flex';
      const devSlider = document.getElementById('dev-slider');
      devSlider.max = route.length - 1;
      const devLabel = document.getElementById('dev-pos-label');

      startTime = Date.now();

      gpsDot = L.marker(route[0], {
        icon: L.divIcon({
          className: '',
          html: '<div class="gps-pulse"></div><div class="gps-dot"></div>',
          iconSize: [18, 18],
          iconAnchor: [9, 9],
        }),
        draggable: true,
        zIndexOffset: 1000,
      }).addTo(map);

      function simulateAt(idx, forceScan) {
        idx = Math.max(0, Math.min(route.length - 1, idx));
        const pct = Math.round(idx / (route.length - 1) * 100);
        devLabel.textContent = `${pct}%`;
        if (forceScan) lastScanTime = 0;
        onPosition({
          coords: { latitude: route[idx][0], longitude: route[idx][1], speed: 5 }
        });
      }

      devSlider.addEventListener('input', () => {
        simulateAt(parseInt(devSlider.value), true);
      });

      const playBtn = document.getElementById('dev-play-btn');
      const speedBtn = document.getElementById('dev-speed-btn');
      const SPEED_STEPS = [1, 2, 5, 10, 20];
      const BASE_MPS = 5;
      let speedIdx = 1;
      let playInterval = null;

      speedBtn.textContent = `${SPEED_STEPS[speedIdx]}x`;

      speedBtn.addEventListener('click', () => {
        speedIdx = (speedIdx + 1) % SPEED_STEPS.length;
        speedBtn.textContent = `${SPEED_STEPS[speedIdx]}x`;
        if (playInterval) { stopPlayback(); startPlayback(); }
      });

      function stopPlayback() {
        clearInterval(playInterval);
        playInterval = null;
        playBtn.textContent = '▶';
      }

      function startPlayback() {
        const TICK_MS = 50;
        const segLengths = [];
        for (let i = 1; i < route.length; i++) {
          segLengths.push(haversine(route[i - 1], route[i]));
        }
        let playIdx = parseInt(devSlider.value);
        let playFrac = 0;

        playBtn.textContent = '⏸';
        playInterval = setInterval(() => {
          const mps = BASE_MPS * SPEED_STEPS[speedIdx];
          let dist = mps * (TICK_MS / 1000);

          while (dist > 0 && playIdx < route.length - 1) {
            const seg = segLengths[playIdx] || 0.001;
            const remaining = seg * (1 - playFrac);
            if (dist >= remaining) {
              dist -= remaining;
              playIdx++;
              playFrac = 0;
            } else {
              playFrac += dist / seg;
              dist = 0;
            }
          }

          if (playIdx >= route.length - 1) {
            devSlider.value = route.length - 1;
            simulateAt(route.length - 1);
            stopPlayback();
            return;
          }

          const a = route[playIdx], b = route[playIdx + 1];
          const lat = a[0] + (b[0] - a[0]) * playFrac;
          const lng = a[1] + (b[1] - a[1]) * playFrac;

          devSlider.value = playIdx;
          const pct = Math.round(playIdx / (route.length - 1) * 100);
          devLabel.textContent = `${pct}%`;
          lastScanTime = 0;
          onPosition({
            coords: { latitude: lat, longitude: lng, speed: mps }
          });
        }, TICK_MS);
      }

      playBtn.addEventListener('click', () => {
        if (playInterval) {
          stopPlayback();
        } else {
          startPlayback();
        }
      });

      gpsDot.on('drag', (e) => {
        const snap = snapToRoute([e.latlng.lat, e.latlng.lng], route);
        devSlider.value = snap.index;
        devLabel.textContent = `${Math.round(snap.index / (route.length - 1) * 100)}%`;
      });

      gpsDot.on('dragend', () => {
        const ll = gpsDot.getLatLng();
        const snap = snapToRoute([ll.lat, ll.lng], route);
        devSlider.value = snap.index;
        simulateAt(snap.index, true);
      });

      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        const step = e.shiftKey ? 10 : 1;
        if (e.key === 'ArrowRight') {
          devSlider.value = Math.min(route.length - 1, parseInt(devSlider.value) + step);
          simulateAt(parseInt(devSlider.value), true);
          e.preventDefault();
        } else if (e.key === 'ArrowLeft') {
          devSlider.value = Math.max(0, parseInt(devSlider.value) - step);
          simulateAt(parseInt(devSlider.value), true);
          e.preventDefault();
        }
      });

      const devUidInput = document.getElementById('dev-uid-input');
      const devUidBtn = document.getElementById('dev-uid-btn');

      const savedUid = hashParams.uid || localStorage.getItem('dev_sq_uid') || '';
      if (savedUid) devUidInput.value = savedUid;

      async function devLoadSq() {
        const uid = devUidInput.value.trim();
        if (!uid) return;
        devUidBtn.textContent = '…';
        const ok = await loadSquadratsForUid(uid);
        if (ok) {
          localStorage.setItem('dev_sq_uid', uid);
          devUidBtn.textContent = 'Loaded';
          simulateAt(parseInt(devSlider.value));
        } else {
          devUidBtn.textContent = 'Failed';
        }
      }

      devUidBtn.addEventListener('click', devLoadSq);
      devUidInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') devLoadSq();
      });

      if (savedUid) devLoadSq();

      simulateAt(0, true);
    }

    window.debugDetours = function() {
      console.log(`Detours: ${detours.length}`);
      detours.forEach((d, i) => console.log(`  [${i}] depart=${d.departIdx} rejoin=${d.rejoinIdx} coords=${d.coords.length}`));
      console.log(`originalRoute: ${originalRoute.length} pts`);
      console.log(`effectiveRoute: ${route.length} pts`);
    };

    window.testDetourSystem = function() {
      let pass = 0, fail = 0;
      function assert(cond, msg) {
        if (cond) { pass++; console.log(`  ✓ ${msg}`); }
        else { fail++; console.error(`  ✗ ${msg}`); }
      }

      function setup() {
        originalRoute.length = 0;
        for (let i = 0; i < 100; i++) originalRoute.push([59.0 + i * 0.001, 24.0 + i * 0.001]);
        detours.length = 0;
        buildEffectiveRoute();
      }
      function hasCoord(lat, lng) { return route.some(p => p[0] === lat && p[1] === lng); }

      /* ── Test 1: no detours ── */
      console.log('Test 1: buildEffectiveRoute with no detours');
      setup();
      assert(route.length === 100, `route.length=${route.length} should be 100`);

      /* ── Test 2: single detour ── */
      console.log('Test 2: single detour A at 20-30');
      setup();
      addDetour(20, 30, [[59.1, 24.1], [59.11, 24.11]]);
      assert(detours.length === 1, `detours.length=${detours.length} should be 1`);
      assert(route.length === 92, `route.length=${route.length} should be 92`);
      assert(hasCoord(59.1, 24.1), 'detour A first coord present');
      assert(originalRoute.length === 100, 'originalRoute unchanged');

      /* ── Test 3: two non-overlapping detours ── */
      console.log('Test 3: two non-overlapping detours');
      setup();
      addDetour(20, 30, [[59.1, 24.1], [59.11, 24.11]]);
      addDetour(50, 60, [[59.2, 24.2], [59.21, 24.21], [59.22, 24.22]]);
      assert(detours.length === 2, `detours.length=${detours.length} should be 2`);
      assert(route.length === 85, `route.length=${route.length} should be 85`);
      assert(hasCoord(59.1, 24.1), 'detour A present');
      assert(hasCoord(59.2, 24.2), 'detour B present');

      /* ── Test 4: three non-overlapping detours ── */
      console.log('Test 4: three non-overlapping detours');
      setup();
      addDetour(20, 30, [[59.1, 24.1]]);
      addDetour(50, 60, [[59.2, 24.2]]);
      addDetour(70, 80, [[59.3, 24.3]]);
      assert(detours.length === 3, `detours.length=${detours.length} should be 3`);
      assert(hasCoord(59.1, 24.1) && hasCoord(59.2, 24.2) && hasCoord(59.3, 24.3), 'all 3 detours present');
      assert(originalRoute.length === 100, 'originalRoute unchanged');

      /* ── Test 5: isInDetourRange ── */
      console.log('Test 5: isInDetourRange');
      assert(isInDetourRange(25), 'idx 25 in range');
      assert(!isInDetourRange(35), 'idx 35 not in range');
      assert(isInDetourRange(55), 'idx 55 in range');
      assert(!isInDetourRange(65), 'idx 65 not in range');

      /* ── Test 6: capture B while inside detour A (no truncation) ── */
      console.log('Test 6: capture B while inside detour A');
      setup();
      const dAcoords = [];
      for (let i = 0; i < 10; i++) dAcoords.push([59.5 + i * 0.001, 24.5 + i * 0.001]);
      addDetour(20, 30, dAcoords);
      assert(detours.length === 1, 'detour A added');
      assert(hasCoord(59.5, 24.5), 'detour A first coord present before capture B');

      const curPt = dAcoords[5];
      let activeDetour = null;
      let bestDetourDist = Infinity;
      for (const d of detours) {
        const s = snapToRoute(curPt, d.coords);
        if (s.distance < bestDetourDist) { bestDetourDist = s.distance; activeDetour = d; }
      }
      const origSnap = snapToRoute(curPt, originalRoute);
      let departIdx;
      if (activeDetour && bestDetourDist <= origSnap.distance) {
        departIdx = activeDetour.rejoinIdx;
      } else {
        activeDetour = null;
        departIdx = origSnap.index;
        for (const d of detours) {
          if (departIdx >= d.departIdx && departIdx < d.rejoinIdx) {
            activeDetour = d; departIdx = d.rejoinIdx;
          }
        }
      }
      assert(activeDetour !== null, 'detected we are inside detour A');
      assert(departIdx === 30, `departIdx pushed to ${departIdx}, should be 30`);

      const rejoinIdx = 50;
      const dBcoords = [[59.6, 24.6], [59.61, 24.61], [59.62, 24.62]];
      addDetour(departIdx, rejoinIdx, dBcoords);

      assert(detours.length === 2, `detours.length=${detours.length} should be 2`);
      assert(hasCoord(59.5, 24.5), 'detour A first coord still present');
      const intactA = detours.find(d => d.departIdx === 20);
      assert(intactA && intactA.coords.length === 10, `A has ${intactA?.coords.length} coords, expected 10 (not truncated)`);
      assert(hasCoord(59.6, 24.6), 'detour B coords present');
      assert(originalRoute.length === 100, 'originalRoute unchanged');

      /* ── Test 7: capture C after completing detour A (past rejoin) ── */
      console.log('Test 7: capture C after passing detour A');
      setup();
      addDetour(20, 30, [[59.1, 24.1], [59.11, 24.11]]);
      const pastPt = originalRoute[40];
      const snapPast = snapToRoute(pastPt, originalRoute);
      let deptC = snapPast.index;
      let activeC = null;
      for (const d of detours) {
        if (deptC >= d.departIdx && deptC < d.rejoinIdx) {
          activeC = d;
          deptC = d.rejoinIdx;
        }
      }
      assert(activeC === null, 'not inside any detour');
      assert(deptC === 40, `departIdx=${deptC} should be 40`);
      addDetour(deptC, 55, [[59.4, 24.4]]);
      assert(detours.length === 2, `detours.length=${detours.length} should be 2`);
      assert(hasCoord(59.1, 24.1), 'detour A still present');
      assert(hasCoord(59.4, 24.4), 'detour C present');

      /* ── Test 8: overlap rejection ── */
      console.log('Test 8: overlap rejection');
      setup();
      addDetour(20, 30, [[59.1, 24.1]]);
      addDetour(25, 40, [[59.2, 24.2]]);
      assert(detours.length === 1, 'overlapping detour rejected');
      assert(hasCoord(59.1, 24.1), 'original detour still present');
